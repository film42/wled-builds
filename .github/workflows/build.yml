name: Build WLED Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: "WLED version to build (e.g. 0.15.4), or 'new' to build all missing"
        required: true
        type: string
        default: "new"
      source:
        description: "Target set (ignored when version is 'new')"
        required: true
        type: choice
        options:
          - all
          - generic
          - quinled
        default: "all"

  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install PlatformIO
        run: uv run pip install platformio

      # Per-env: build → attest → publish (all in Python)
      - name: Build, attest, and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          VERSION="${{ inputs.version || 'new' }}"
          if [ "$VERSION" = "new" ]; then
            uv run wled-build build-new --output build_output
          else
            uv run wled-build build "$VERSION" \
              --source "${{ inputs.source || 'all' }}" \
              --output build_output
          fi

      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-${{ github.run_id }}
          path: |
            build_output/**/audit/
            build_output/**/logs/
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find build_output -name "*.bin" -exec sh -c 'echo "$(sha256sum "$1" | cut -d" " -f1)  $(basename "$1")"' _ {} \; | sort >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No binaries"
          echo '```' >> $GITHUB_STEP_SUMMARY
